spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/easyhire}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:yash}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET:your-very-secure-secret-key-1234567890}
  expiration: 86400000

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
